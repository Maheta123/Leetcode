name: LeetCode Repository Validation

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Count CPP Files
        run: |
          count=$(find . -name "*.cpp" | wc -l)
          echo "Found $count cpp files"

          if [ "$count" -eq 0 ]; then
            echo "No cpp files found"
            exit 1
          fi

      - name: List Solutions
        run: |
          find . -name "*.cpp" | sort

      - name: Success
        run: echo "Repository validation completed successfully"
