
name: C++ CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show files
        run: find . -name "*.cpp"

      - name: Compile sample file
        run: |
          g++ -std=c++17 "Recover Binary Search Tree.cpp" -o test
