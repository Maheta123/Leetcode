name: C++ CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Find CPP files
        run: find . -name "*.cpp"

      - name: Syntax Check All Solutions
        run: |
          find . -name "*.cpp" -print0 | while IFS= read -r -d '' file
          do
            echo "Checking $file"
            g++ -std=c++17 -fsyntax-only "$file"
          done
