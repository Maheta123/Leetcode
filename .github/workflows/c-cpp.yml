name: C++ CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Debug
        run: |
          pwd
          ls -R
          find . -name "*.cpp"

      - name: Compile
        run: |
          g++ -std=c++17 "./Recover Binary Search Tree.cpp" -o test
